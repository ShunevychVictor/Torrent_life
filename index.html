<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torrent Catalog</title>
  
  <!-- Підключення стилів -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>⚡ Open Torrent Catalog</h1>
    <p>Автоматичний каталог торентів на GitHub</p>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Пошук торента за назвою...">
  </div>

  <div class="torrent-list" id="torrentList">
    <p style="text-align: center;">Завантаження бази даних...</p>
  </div>

  <script>
    let torrentsData = [];

    // Завантаження JSON з обходом кешування браузера
    async function loadTorrents() {
      try {
        // ?v=... забігає наперед і змушує браузер завжди брати свіжий файл з сервера
        const response = await fetch('torrents.json?v=' + new Date().getTime());
        
        if (!response.ok) {
          throw new Error('Файл torrents.json не знайдено');
        }
        
        torrentsData = await response.json();
        renderTorrents(torrentsData);
      } catch (error) {
        console.error('Помилка:', error);
        document.getElementById('torrentList').innerHTML = `
          <div style="text-align: center; padding: 2rem; background: var(--card-bg, #1e293b); border-radius: 10px;">
            <p style="color: #ef4444; font-weight: bold; margin-bottom: 0.5rem;">База даних ще не завантажилася або порожня.</p>
            <p style="color: #94a3b8; font-size: 0.9rem;">Перевірте, чи завантажено .torrent файли в папку <b>torrents/</b> і чи створився файл <b>torrents.json</b>.</p>
          </div>
        `;
      }
    }

    // Відображення списку торентів
    function renderTorrents(list) {
      const container = document.getElementById('torrentList');
      
      if (!list || list.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #94a3b8;">За вашим запитом нічого не знайдено.</p>';
        return;
      }

      container.innerHTML = list.map(item => `
        <div class="torrent-card">
          <div class="info">
            <h3>${escapeHtml(item.title)}</h3>
            <div class="meta">
              <span>💾 ${item.size || 'N/A'}</span>
              <span>📅 ${item.date || ''}</span>
            </div>
          </div>
          <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
            ${item.fileUrl ? `<a href="${item.fileUrl}" class="btn-torrent" download>.torrent</a>` : ''}
            <a href="${item.magnet}" class="btn-magnet">Magnet</a>
          </div>
        </div>
      `).join('');
    }

    // Безпечний вивід тексту (захист від XSS)
    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // Живий пошук
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      const filtered = torrentsData.filter(item => 
        item.title.toLowerCase().includes(query)
      );
      renderTorrents(filtered);
    });

    // Стартовий запуск
    loadTorrents();
  </script>

</body>
</html>
