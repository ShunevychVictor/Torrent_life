name: Generate Torrent JSON Database

on:
  push:
    paths:
      - 'torrents/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install parse-torrent

      - name: Run parser script
        run: node scripts/generate-json.js

      - name: Commit and push updated torrents.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add torrents.json
          git status
          git diff-index --quiet HEAD || (git commit -m "Auto-update torrents.json" && git push)
